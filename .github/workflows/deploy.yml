name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'companies-e474c' }}
      REGION: ${{ secrets.GCP_REGION || 'europe-west1' }}
      REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPOSITORY || 'buildweek' }}
      SERVICE_NAME: ${{ secrets.CLOUD_RUN_SERVICE || 'build-camp' }}
      IMAGE_NAME: ${{ secrets.IMAGE_NAME || 'build-camp' }}
      TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy
        run: ./deploy.sh
